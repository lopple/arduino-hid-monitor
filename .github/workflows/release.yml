name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $tag = "v$version"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
            $tag = "${{ github.ref_name }}"
          }
          $isPrerelease = $version.StartsWith("0.") -or $version.Contains("-")
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$($isPrerelease.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build executable archive
        shell: pwsh
        run: .\scripts\build-windows-tools.ps1 -PackageVersion "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: arduino-hid-monitor ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            release/*.zip
            release/*.sha256

  release-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="v$version"
          else
            tag="${{ github.ref_name }}"
            version="${tag#v}"
          fi
          prerelease=false
          case "$version" in
            0.*|*-*) prerelease=true ;;
          esac
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Compile Python sources
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for path in sorted(Path("tools").rglob("*.py")):
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
              print(path)
          PY

      - name: Build macOS archive
        run: ./scripts/build-macos-tools.sh "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: arduino-hid-monitor ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            release/*.zip
            release/*.sha256