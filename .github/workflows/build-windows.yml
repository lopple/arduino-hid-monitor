name: Build Windows tools

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows-tools:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build executable archive
        shell: pwsh
        run: .\scripts\build-windows-tools.ps1 -PackageVersion "0.0.0-${{ github.sha }}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: arduino-hid-monitor-windows-amd64
          path: |
            release/*.zip
            release/*.sha256
          if-no-files-found: error
